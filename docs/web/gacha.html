<!doctype html>
<html lang="ja">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <title>ガチャ確率計算機</title>
  <link rel="stylesheet" href="../theme.css?v8" />
  <style>
    .tool-grid {
      display: grid;
      gap: 18px;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    }

    .form-grid {
      display: grid;
      gap: 12px;
    }

    .field-stack {
      grid-column: 2;
      display: grid;
      gap: 8px;
    }

    .field-stack input {
      grid-column: auto;
      width: min(100%, 9em);
    }

    .rate-count-list {
      display: grid;
      gap: 8px;
    }

    .rate-count-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .rate-count-value {
      color: var(--md-sys-on-surface-variant);
      font-size: 0.9rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .rate-count-symbol {
      color: var(--md-sys-on-surface-variant);
      font-size: 0.9rem;
      font-weight: 700;
    }

    .rate-count-group {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .rate-count-group .chip-button {
      min-width: 34px;
      padding: 6px 10px;
    }

    .help-label {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      width: fit-content;
      cursor: help;
    }

    .help-mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      height: 18px;
      border-radius: 999px;
      border: 1px solid var(--md-sys-outline-variant);
      color: var(--md-sys-on-surface-variant);
      font-size: 0.75rem;
      line-height: 1;
    }

    .label-note {
      position: absolute;
      left: 0;
      top: calc(100% + 8px);
      z-index: 30;
      width: min(280px, calc(100vw - 48px));
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid var(--md-sys-outline-variant);
      background: var(--md-sys-surface);
      color: var(--md-sys-on-surface);
      box-shadow: 0 10px 25px var(--md-sys-shadow);
      font-size: 0.85rem;
      font-weight: 500;
      line-height: 1.5;
      opacity: 0;
      pointer-events: none;
      transform: translateY(-4px);
      transition: opacity 0.15s ease, transform 0.15s ease;
    }

    .help-label:hover .label-note,
    .help-label.is-open .label-note,
    .help-label:focus-within .label-note {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .help-mark:focus-visible {
      outline: 2px solid var(--md-sys-primary);
      outline-offset: 2px;
    }

    .result-summary {
      cursor: pointer;
      user-select: none;
    }

    .result-summary:focus-visible {
      outline: 2px solid var(--md-sys-primary);
      outline-offset: 2px;
    }

    .result-detail-panel {
      margin-top: 8px;
      gap: 8px;
    }

    .result-detail-panel:not(.is-hidden) {
      display: grid;
    }

    .result-detail-title {
      margin: 0 0 8px;
      color: var(--md-sys-on-surface-variant);
      font-weight: 700;
      font-size: 0.9rem;
    }

    .result-detail-list {
      display: grid;
      gap: 8px;
    }

    .result-detail-entry {
      display: grid;
      gap: 3px;
    }

    .result-detail-meta {
      color: var(--md-sys-on-surface-variant);
      font-size: 0.85rem;
      line-height: 1.45;
    }

    .result-detail-value {
      font-size: 0.95rem;
      font-weight: 700;
      text-align: right;
      overflow-wrap: anywhere;
      word-break: normal;
      line-height: 1.35;
    }

    .text-button {
      appearance: none;
      border: none;
      padding: 0;
      background: transparent;
      color: var(--md-sys-primary);
      font: inherit;
      font-size: 0.9rem;
      cursor: pointer;
    }

    .text-button:hover {
      text-decoration: underline;
    }

    .text-button:focus-visible {
      outline: 2px solid var(--md-sys-primary);
      outline-offset: 4px;
    }

    .chart-card {
      min-height: auto;
    }

    .chart-wrap {
      width: 100%;
      min-height: 250px;
    }

    .chart-canvas {
      width: 100%;
      height: 250px;
      display: block;
      border-radius: 12px;
      border: 1px solid var(--md-sys-outline-variant);
      background: var(--md-sys-surface);
    }

    .formula-table {
      width: 100%;
      border-collapse: collapse;
      border: 1px solid var(--md-sys-outline-variant);
      border-radius: 12px;
      overflow: hidden;
      background: var(--md-sys-surface);
    }

    .formula-table th,
    .formula-table td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--md-sys-outline-variant);
      text-align: left;
      vertical-align: top;
      font-size: 0.92rem;
      line-height: 1.5;
    }

    .formula-table tr:last-child th,
    .formula-table tr:last-child td {
      border-bottom: none;
    }

    .formula-table th {
      width: 180px;
      color: var(--md-sys-on-surface-variant);
      font-weight: 600;
      background: color-mix(in srgb, var(--md-sys-surface) 90%, var(--md-sys-primary-container));
    }
  </style>
</head>

<body>
  <main>
    <header class="reveal">
      <p class="subtitle">Eldersign Toolkit</p>
      <h1>ガチャ確率計算機</h1>
      <p class="subtitle">選択肢の中に狙いが含まれる回数を二項分布で計算</p>
      <div class="nav-links">
        <a class="button secondary" href="../index.html">ツール集へ戻る</a>
      </div>
    </header>

    <div class="reveal calc-output-panel">
      <div class="calc-output-grid">
        <article class="calc-output-item">
          <div class="result-card">
            <div id="gacha-result-summary" class="result-summary" role="button" tabindex="0" aria-expanded="false"
              aria-controls="gacha-result-detail">
              <div id="gacha-result-list" class="result-pair-list"></div>
            </div>
            <div id="gacha-result-detail" class="divider result-divider result-detail-panel is-hidden">
              <div class="result-detail-section">
                <p class="result-detail-title">詳細</p>
                <div id="gacha-detail-list" class="result-detail-list"></div>
              </div>
            </div>
          </div>
        </article>
      </div>
    </div>

    <section class="reveal">
      <div class="section-title">
        <h2>入力</h2>
      </div>
      <div class="tool-grid">
        <article class="card no-hover">
          <h3>ガチャ結果</h3>
          <div class="form-grid">
            <div class="input-row">
              <label id="draw-count-label" class="help-label" for="draw-count">
                引いた回数
                <span class="help-mark" tabindex="0" aria-label="引いた回数の換算条件">?</span>
                <span class="label-note" role="tooltip">1万円で11000コインを購入し、1回300コインで引く前提で換算しています。</span>
              </label>
              <div class="field-stack">
                <input id="draw-count" type="number" step="1" value="100" />
                <div id="draw-preset-buttons" class="chip-group" aria-label="引いた回数プリセット">
                  <button type="button" class="chip-button" data-draw-count="110">3万</button>
                  <button type="button" class="chip-button" data-draw-count="366">10万</button>
                </div>
              </div>
            </div>
            <div class="input-row">
              <label for="choice-count">選択肢の数</label>
              <input id="choice-count" type="number" step="1" value="3" />
            </div>
            <div class="input-row">
              <label for="target-rate">狙いの排出率(%)</label>
              <div class="field-stack">
                <input id="target-rate" type="number" step="0.001" value="1" />
                <div id="rate-preset-buttons" class="rate-count-list" aria-label="排出率プリセット">
                  <div class="rate-count-row">
                    <div class="rate-count-value">1.109%</div>
                    <div class="rate-count-symbol">×</div>
                    <div class="rate-count-group" aria-label="1.109%を足す数">
                      <button type="button" class="chip-button chip-rarity-gold is-active" data-rate="1.109"
                        data-slots="0">0</button>
                      <button type="button" class="chip-button chip-rarity-gold" data-rate="1.109"
                        data-slots="1">1</button>
                      <button type="button" class="chip-button chip-rarity-gold" data-rate="1.109"
                        data-slots="2">2</button>
                    </div>
                  </div>
                  <div class="rate-count-row">
                    <div class="rate-count-value">0.085%</div>
                    <div class="rate-count-symbol">×</div>
                    <div class="rate-count-group" aria-label="0.085%を足す数">
                      <button type="button" class="chip-button chip-rarity-platinum is-active" data-rate="0.085"
                        data-slots="0">0</button>
                      <button type="button" class="chip-button chip-rarity-platinum" data-rate="0.085"
                        data-slots="1">1</button>
                      <button type="button" class="chip-button chip-rarity-platinum" data-rate="0.085"
                        data-slots="2">2</button>
                      <button type="button" class="chip-button chip-rarity-platinum" data-rate="0.085"
                        data-slots="3">3</button>
                      <button type="button" class="chip-button chip-rarity-platinum" data-rate="0.085"
                        data-slots="4">4</button>
                    </div>
                  </div>
                </div>
              </div>
            </div>
            <div class="input-row">
              <label for="hit-count">当たりの数</label>
              <input id="hit-count" type="number" step="1" value="0" />
            </div>
          </div>
        </article>
      </div>
    </section>

    <section class="reveal">
      <div class="section-title">
        <h2>分布グラフ</h2>
        <button id="share-twitter" class="text-button" type="button">Twitterでシェア</button>
      </div>
      <article class="card no-hover chart-card">
        <div class="chart-wrap">
          <canvas id="gacha-chart" class="chart-canvas" width="960" height="300"></canvas>
        </div>
        <p class="hint" id="gacha-chart-note">-</p>
      </article>
    </section>

    <section class="reveal">
      <div class="section-title">
        <h2>計算式</h2>
      </div>
      <article class="card no-hover">
        <table class="formula-table">
          <tbody>
            <tr>
              <th>1回あたりの当たり率</th>
              <td>1 - (1 - 狙いの排出率) ^ 選択肢の数</td>
            </tr>
            <tr>
              <th>当たり回数</th>
              <td>引いた回数を n、1回あたりの当たり率を p とする二項分布 B(n, p)</td>
            </tr>
            <tr>
              <th>期待値/標準偏差</th>
              <td>期待値 = n × p / 標準偏差 = √(n × p × (1 - p))</td>
            </tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <script src="./tool-common.js?v2" defer></script>
  <script src="./gacha.js?v18" defer></script>
  <script src="../footer.js" defer></script>
</body>

</html>
